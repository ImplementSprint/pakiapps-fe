# ──────────────────────────────────────────────────────────────
# FE Pipeline Caller (unified)
# Copy this file into the target repo at:
#   .github/workflows/master-pipeline-fe.yml
#
# Works for both single-system and multi-system FE repositories.
# The pipeline_mode input controls which SYSTEMS_JSON variable
# is read (auto = picks multi if available, else single).
#
# Required repo secret:
# - GH_PR_TOKEN (used for auto-promotion PRs and Vercel deploy PR comments)
# ──────────────────────────────────────────────────────────────
name: "Master Pipeline — FE"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "Run deploy jobs"
        type: boolean
        default: true
      run_promotion:
        description: "Run PR promotion jobs"
        type: boolean
        default: true
      dry_run:
        description: "Preview-only mode (skip deploy/tag push, print PR body)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  packages: write
  security-events: write

jobs:
  call-orchestrator:
    uses: ImplementSprint/central-workflow/.github/workflows/master-pipeline-fe.yml@main
    with:
      pipeline_mode: multi
      run_deploy: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_deploy == 'true' }}
      run_promotion: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_promotion == 'true' }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
    secrets: inherit
